<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}App{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        /* Replicating the Flutter Drawer Layout */
        body {
            background-color: #f8f9fa;
        }
        #sidebar {
            min-width: 250px;
            max-width: 250px;
            min-height: 100vh;
            background-color: #ffffff;
            transition: all 0.3s;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar-header {
            background-color: #800000; /* Replicating Color(0xFF800000) */
            color: white;
            padding: 40px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-end;
            min-height: 150px;
        }
        .sidebar-header h4 {
            margin-top: 10px;
            margin-bottom: 0;
            font-size: 24px;
        }
        .sidebar-header i {
            font-size: 48px;
        }
        .nav-pill-custom.active, .nav-pill-custom:hover {
            background-color: rgba(128, 0, 0, 0.1);
            color: #800000;
        }
        .nav-pill-custom {
            color: #333;
            border-radius: 0;
            padding: 15px 20px;
            font-weight: 500;
        }
        
        #content {
            width: 100%;
        }
        
        .navbar-custom {
            background-color: #800000;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<div class="d-flex">
    <!-- Sidebar / Drawer -->
    <nav id="sidebar" class="d-none d-md-block">
        <div class="sidebar-header">
            <i class="bi bi-shield-lock-fill"></i>
            <h4>Admin Panel</h4>
        </div>

        <ul class="list-unstyled components mt-2">
            <li>
                <a href="/admin-dashboard" class="nav-link nav-pill-custom {% if request.path == '/admin-dashboard' %}active{% endif %}">
                    <i class="bi bi-megaphone me-3"></i> Announcements
                </a>
            </li>
            <li>
                <a href="/admin/appointments" class="nav-link nav-pill-custom {% if request.path == '/admin/appointments' %}active{% endif %}">
                    <i class="bi bi-calendar-event me-3"></i> Manage Appointments
                </a>
            </li>
            <li>
                <a href="/admin/users/add" class="nav-link nav-pill-custom {% if request.path == '/admin/users/add' %}active{% endif %}">
                    <i class="bi bi-person-plus me-3"></i> Manage Users
                </a>
            </li>
        </ul>
    </nav>

    <!-- Page Content -->
    <div id="content">
        <!-- AppBar -->
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
            <div class="container-fluid">
                <button type="button" id="sidebarCollapse" class="btn btn-outline-light d-md-none me-2">
                    <i class="bi bi-list"></i>
                </button>
                <span class="navbar-brand mb-0 h1">{% block navbar_title %}Dashboard{% endblock %}</span>
                <div class="d-flex ms-auto">
                    <form action="{% url 'custom-logout' %}" method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light border-0"><i class="bi bi-box-arrow-right"></i></button>
                    </form>
                </div>
            </div>
            {% block navbar_bottom %}{% endblock %}
        </nav>

        <!-- Main Body -->
        <div class="container-fluid p-4">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarCollapse').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('d-none');
    });
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
